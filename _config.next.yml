# ===============================================================
# NexT 主题配置文件 (_config.next.yml)
# ===============================================================

# ---------------------------------------------------------------
# 1. 主题外观、动画与基础体验 (Scheme & Base)
# ---------------------------------------------------------------
scheme: Gemini
darkmode: true          # 开启暗黑模式切换

pjax: false              # Pjax 无刷新加载 (极速切页体验)

pace:
  enable: true          # 页面顶部加载进度条
  theme: minimal 

motion:
  enable: true          # 开启入场浮现动画

# -----------------------------------1----------------------------
# 2. 菜单与导航设置 (Menu & Navigation)
# ---------------------------------------------------------------
menu:
  home: / || fa fa-home
  archives: /archives/ || fa fa-archive
  categories: /categories/ || fa fa-th
  tags: /tags/ || fa fa-tags
  photos: /photos/ || fa fa-camera
  about: /about/ || fa fa-user

menu_settings:
  icons: true
  badges: true          # 显示分类/标签的数量徽章

# ---------------------------------------------------------------
# 3. 侧边栏与个人信息 (Sidebar & Profile)
# ---------------------------------------------------------------
sidebar:
  position: left
  display: post         # 只在文章页显示侧边栏
  padding: 18
  offset: 12
  onmobile: true

avatar:
  url: /images/avatar.jpg
  rounded: true
  rotated: false

social:
  Youtube: https://www.youtube.com/@Shawn_Peng196_CN || fab fa-youtube
  E-Mail: mailto:zixaunpeng681@gmail.com || fa fa-envelope
  Bilibili: https://space.bilibili.com/332737053 || fab fa-bilibili
  Douban: https://www.douban.com/people/202616606 || fa fa-tv

# ---------------------------------------------------------------
# 4. 文章与阅读体验 (Post & Reading)
# ---------------------------------------------------------------
toc:
  enable: true
  number: true
  auto_open: true
  max_depth: 3

back2top:
  enable: true
  sidebar: true
  scrollpercent: true

reading_progress:
  enable: true
  start_at_top: false
  color: "#37c6c0"
  height: 3px

symbols_count_time:
  separated_meta: true
  item_text_post: true
  item_text_total: true
  awl: 4
  wpm: 275
  suffix: "mins."

bookmark:               # 开启阅读书签记忆功能 (长文必备)
  enable: true
  color: "#37c6c0"
  save: auto

related_posts:          # 相关文章推荐 (底部展示)
  enable: true
  title: 推荐阅读
  display_in_home: false
  params:
    maxCount: 5

creative_commons:
  license: by-nc-sa
  sidebar: false
  post: true
  language: deedu

reward_settings:
  enable: true
  animation: true

reward:
  wechatpay: /images/wechatpay.png
  alipay: /images/alipay.png

# ---------------------------------------------------------------
# 5. 代码、公式与排版优化 (Code & Typography)
# ---------------------------------------------------------------
codeblock:
  border_radius: true
  copy_button:
    enable: true
    show_result: true
    style: mac
  fold:                 # 开启长代码自动折叠
    enable: true
    height: 500

font:
  enable: true
  host: https://fonts.googleapis.com
  global:
    external: true
    family: Noto Sans SC
    size: 16px
  headings:
    external: true
    family: Noto Serif SC
    size:
  body:
    external: true
    family: Noto Sans SC
    size:
  code:
    external: true
    family: JetBrains Mono
    size:

math:
  mathjax:
    enable: true
    tags: none

note:                   # 开启内置的 Note 提示块功能
  enable: true
  style: flat
  icons: true
  border_radius: 4

# ---------------------------------------------------------------
# 6. 第三方功能与统计 (3rd Party & Analytics)
# ---------------------------------------------------------------
busuanzi_count:
  enable: true
  total_visitors: true
  total_visitors_icon: fa fa-user
  total_views: true
  total_views_icon: fa fa-eye
  post_views: true
  post_views_icon: fa fa-eye

local_search:
  enable: true
  trigger: auto
  top_n_per_article: 10
  unescape: false
  preload: true

mediumzoom:
  enable: true
  enable_on_post: true

lazyload:
  enable: true
  only_post: true
  loading_image: /images/loading.gif

# ---------------------------------------------------------------
# 7. 评论系统 (Comments)
# ---------------------------------------------------------------
comments:
  active: giscus

giscus:
  enable: true
  repo: Windsor-Andrew/blog
  repo_id: R_kgDORDYTUg
  category: Announcements
  category_id: DIC_kwDORDYTUs4C1wm4
  mapping: pathname
  reactions_enabled: 1
  emit_metadata: 0
  theme: dark
  lang: zh-CN

# ---------------------------------------------------------------
# 8. 底部、分享与高级自定义注入 (Footer & Custom Inject)
# ---------------------------------------------------------------
footer:
  since: 2026
  icon:
    name: fa fa-heart
    animated: true
    color: "#ff0000"
  copyright: pengzixuan
  powered: false
  theme:
    enable: false
    version: false

favicon:
  small: /images/favicon.ico
  medium: /images/favicon.ico
  apple_touch_icon: /images/favicon.ico
  safari_pinned_tab: /images/favicon.ico

github_banner:          # 网页右上角的 GitHub 挂件
  enable: true
  permalink: https://github.com/Windsor-Andrew
  title: Follow me on GitHub

open_graph:
  enable: true
  options:
    type: blog

twitter:
  enable: true
  username: shawn_peng196

custom_file_path:
  style: source/_data/styles.styl
  languages: source/_data/languages.yml
  bodyEnd: source/_data/body-end.njk
  sidebar: source/_data/sidebar.njk

google_analytics:
  tracking_id: G-WGYWR2SYTJ  # 填入你刚才复制的 ID
  only_pageview: false       # 改为 false，收集更全面的数据