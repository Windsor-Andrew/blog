# ==============================================================================
# Hexo 核心配置文件 (_config.yml)
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. 站点基本信息 (Site)
# ------------------------------------------------------------------------------
title: 彭梓轩的个人主页 | Peng Zixuan
subtitle: 电子科学 | 嵌入式开发 | 移动通信
description: 彭梓轩(Peng Zixuan)的个人网站，分享RIS辅助毫米波系统研究、嵌入式开发与生活随笔。
keywords: 电子科学, 嵌入式, RIS, 毫米波, 博客, Hexo
author: Peng Zixuan
language: zh-CN
timezone: Asia/Shanghai

# ------------------------------------------------------------------------------
# 2. 链接与路由 (URL & Permalink)
# ------------------------------------------------------------------------------
url: https://pengzixuan.top
permalink: posts/:abbrlink/   # 使用 abbrlink 生成短链接，有利于 SEO
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# abbrlink 插件设置
abbrlink:
  alg: crc32
  rep: hex

# ------------------------------------------------------------------------------
# 3. 目录与文件处理 (Directory)
# ------------------------------------------------------------------------------
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang

# 忽略渲染的文件/文件夹
skip_render:
  - 'baidu_verify_*.html'
  - 'images/**/*'
  - 'files/**/*'
  - 'README.md'

# ------------------------------------------------------------------------------
# 4. 文章写作与渲染 (Writing)
# ------------------------------------------------------------------------------
new_post_name: :title.md
default_layout: post
titlecase: false
filename_case: 0
render_drafts: false
relative_link: false
future: true

external_link:
  enable: true
  field: site
  exclude: ''

# 图片资源文件夹与渲染
post_asset_folder: true
marked:
  prependRoot: true
  postAsset: true

# 代码高亮 (Highlight.js)
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

# ------------------------------------------------------------------------------
# 5. 分页设置 (Pagination)
# ------------------------------------------------------------------------------
per_page: 10
pagination_dir: page

index_generator:
  path: ''
  per_page: 10
  order_by: -date

archive_generator:
  per_page: 10
  yearly: true
  monthly: true

category_generator:
  per_page: 10

tag_generator:
  per_page: 10

# ------------------------------------------------------------------------------
# 6. 主题与扩展 (Extensions)
# ------------------------------------------------------------------------------
theme: next

# ------------------------------------------------------------------------------
# 7. 搜索功能 (Search)
# ------------------------------------------------------------------------------
search:
  path: search.xml
  field: post
  content: true
  format: html

# ------------------------------------------------------------------------------
# 8. RSS 订阅 (Feed)
# ------------------------------------------------------------------------------
feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content: true
  content_limit: 140
  order_by: -date

# ------------------------------------------------------------------------------
# 9. 站点地图与 SEO (Sitemap)
# ------------------------------------------------------------------------------
sitemap:
  path: sitemap.xml
  rel: false
  tags: true
  categories: true

# ------------------------------------------------------------------------------
# 10. 本地服务器配置 (Server)
# ------------------------------------------------------------------------------
server:
  port: 4000
  compress: true
  header: true

# ------------------------------------------------------------------------------
# 11. 部署配置 (Deployment)
# ------------------------------------------------------------------------------
deploy:
  type: git
  repo: https://github.com/Windsor-Andrew/blog.git
  branch: main

# ------------------------------------------------------------------------------
# 12. 日期、分类与其他杂项 (Miscellaneous)
# ------------------------------------------------------------------------------
default_category: uncategorized
category_map:
tag_map:

date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

comments: true
meta_generator: true

# ------------------------------------------------------------------------------
# 13. 插件列表与文章加密 (Plugins & Encrypt)
# ------------------------------------------------------------------------------
plugins:
  - hexo-blog-encrypt

encrypt:
  enable: true
  default_abstract: "🔒 这是一篇加密的私密文章，请点击「阅读全文」并输入密码解锁。"
  default_message: "请输入密码查看正文内容："
  default_decryption_error: "密码错误，请重试！"

tag_cloud:
  textFont: "Noto Sans SC, sans-serif"
  textColor: '#333'
  textAmount: 200
  outlineColor: '#e0e0e0'
  backgroundColor: 'transparent'
  startFontSize: 14
  endFontSize: 28